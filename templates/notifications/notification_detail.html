{% extends 'base.html' %}
{% block title %}Notification{% endblock %}
{% block content %}
<div class="page-header"><h1>{{ notification.title }}</h1><p>{{ notification.created_at|timesince }} ago</p></div>
<div class="card" style="max-width:600px;">
    <div class="card-body">
        <span class="badge badge-info mb-2">{{ notification.get_notification_type_display }}</span>
        <p style="font-size:15px;line-height:1.7;margin-top:12px;">{{ notification.message }}</p>
        <div class="mt-3"><a href="{% url 'notification_list' %}" class="btn btn-outline">← Back to Notifications</a></div>
    </div>
</div>
{% endblock %}
